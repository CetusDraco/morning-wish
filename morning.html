<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝福</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #1a1a1a;
            overflow: hidden;
        }

        .slideshow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            z-index: 1;
        }

        .slide.active { opacity: 1; }

        .slide::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.4) 100%);
        }

        .fade-edge {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 3;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
        }

        .vignette {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 4;
            box-shadow: inset 0 0 200px rgba(0,0,0,0.5);
        }

        .content {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            max-width: 90%;
        }

        .recipient {
            font-size: 28px;
            color: #ffd700;
            margin-bottom: 25px;
            letter-spacing: 6px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }

        .greeting {
            font-size: 34px;
            font-weight: 300;
            color: #fff;
            margin-bottom: 40px;
            letter-spacing: 8px;
        }

        .time {
            font-size: 85px;
            font-weight: 100;
            color: #fff;
            letter-spacing: 10px;
            text-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }

        .date {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            letter-spacing: 4px;
            margin-top: 25px;
            text-transform: uppercase;
        }

        .message {
            margin-top: 40px;
            margin-bottom: 100px;
            font-size: 18px;
            color: rgba(255,255,255,0.9);
            line-height: 2;
            max-width: 520px;
        }

        .quote-block {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            max-width: 560px;
        }

        .quote {
            font-size: 13px;
            color: rgba(255,255,255,0.65);
            font-style: italic;
        }

        .share-info {
            position: fixed;
            bottom: 55px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .music-player {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .music-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7);
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 2px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .music-btn:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        .music-btn.playing {
            background: rgba(255,215,0,0.2);
            border-color: #ffd700;
            color: #ffd700;
        }

        .music-icon {
            font-size: 16px;
        }
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 2px;
        }

        .controls {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 8px;
        }

        .control-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s;
        }

        .control-dot.active {
            background: #ffd700;
            transform: scale(1.3);
        }

        .surprise-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.9);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .surprise-content {
            text-align: center;
            animation: scaleIn 0.6s ease;
        }

        @keyframes scaleIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .surprise-icon { font-size: 90px; margin-bottom: 20px; }

        .surprise-text {
            font-size: 32px;
            color: #ffd700;
            margin-bottom: 12px;
        }

        .surprise-sub {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
        }

        .surprise-close {
            background: transparent;
            border: 1px solid rgba(255,215,0,0.5);
            color: #ffd700;
            padding: 12px 35px;
            font-size: 13px;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .surprise-close:hover {
            background: rgba(255,215,0,0.2);
        }

        .confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 99;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .surprise-btn {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255,215,0,0.15);
            border: 1px solid rgba(255,215,0,0.4);
            color: #ffd700;
            padding: 12px 30px;
            font-size: 13px;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            transition: all 0.4s;
        }

        .surprise-btn:hover {
            background: rgba(255,215,0,0.25);
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }
    </style>
</head>
<body>
    <div class="music-player">
        <button class="music-btn" id="musicBtn" onclick="toggleMusic()">
            <span class="music-icon" id="musicIcon">🎵</span>
            <span id="musicText">播放音乐</span>
        </button>
    </div>

    <div class="slideshow">
        <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1920')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1920')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1920')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=1920')"></div>
    </div>

    <div class="fade-edge"></div>
    <div class="vignette"></div>

    <div class="content">
        <div class="recipient" id="recipient"></div>
        <div class="greeting" id="greeting">早上好</div>
        <div class="time" id="time"></div>
        <div class="date" id="date"></div>
        <div class="message" id="message"></div>
    </div>

    <div class="quote-block">
        <div class="quote" id="quote"></div>
    </div>

    <button class="surprise-btn" onclick="showSurprise()">✨ 领取今日祝福 ✨</button>

    <div class="share-info" id="shareInfo"></div>

    <div class="controls" id="controls"></div>

    <div class="surprise-modal" id="surpriseModal">
        <div class="surprise-content">
            <div class="surprise-icon" id="surpriseIcon"></div>
            <div class="surprise-text" id="surpriseText"></div>
            <div class="surprise-sub" id="surpriseSub"></div>
            <button class="surprise-close" onclick="closeSurprise()">收下祝福</button>
        </div>
    </div>

    <div class="confetti-container" id="confettiContainer"></div>

    <script>
        // 免费音乐源 - 使用Pixabay的免费音乐
        const musicUrls = [
            'https://cdn.pixabay.com/audio/2022/03/15/audio_4b3a88d0b0.mp3',
            'https://cdn.pixabay.com/audio/2022/10/25/audio_946bc8de87.mp3',
            'https://cdn.pixabay.com/audio/2023/07/30/audio_e5b6e6c3d5.mp3'
        ];
        const musicNames = ['清晨', '午后', '夜幕'];
        let currentMusicIndex = 0;
        let isPlaying = false;
        let audio = new Audio();

        function toggleMusic() {
            if (!isPlaying) {
                loadMusic(currentMusicIndex);
                audio.play();
                isPlaying = true;
                document.getElementById('musicBtn').classList.add('playing');
                document.getElementById('musicIcon').textContent = '⏸️';
                document.getElementById('musicText').textContent = musicNames[currentMusicIndex];
            } else {
                audio.pause();
                isPlaying = false;
                document.getElementById('musicBtn').classList.remove('playing');
                document.getElementById('musicIcon').textContent = '🎵';
                document.getElementById('musicText').textContent = '播放音乐';
            }
        }

        function loadMusic(index) {
            audio.src = musicUrls[index];
            audio.addEventListener('ended', () => {
                currentMusicIndex = (currentMusicIndex + 1) % musicUrls.length;
                loadMusic(currentMusicIndex);
                if (isPlaying) audio.play();
            });
        }

        const params = new URLSearchParams(window.location.search);
        const name = params.get('n') || '';
        const customMsg = params.get('m') || '';
        const sender = params.get('f') || '';
        const timeParam = params.get('t') || 'morning';

        const morningQuotes = [
            '"山高水长，顺其自然。"',
            '"日出而作，日落而息。"',
            '"天地有大美而不言。"',
            '"行到水穷处，坐看云起时。"',
            '"明月松间照，清泉石上流。"'
        ];

        const noonQuotes = [
            '"午后的阳光最温柔。"',
            '"日午槐风起，蔷薇一架香。"',
            '"独坐黄昏谁是伴，紫薇花对紫薇郎。"',
            '"树阴满地日当午，梦觉流莺时一声。"'
        ];

        const eveningQuotes = [
            '"夕阳无限好，只是近黄昏。"',
            '"浮云游子意，落日故人情。"',
            '"日暮苍山远，天寒白屋贫。"',
            '"一道残阳铺水中，半江瑟瑟半江红。"'
        ];

        const greetings = {
            morning: { text: '早上好', emoji: '🌅' },
            noon: { text: '中午好', emoji: '☀️' },
            evening: { text: '晚上好', emoji: '🌙' }
        };

        const surprises = [
            { icon: '🌟', text: '今日运势极佳', sub: '做任何事都会顺顺利利！' },
            { icon: '💫', text: '好运降临', sub: '今天可能有意外惊喜~' },
            { icon: '✨', text: '心想事成', sub: '愿望会慢慢实现。' },
            { icon: '🍀', text: '幸运常伴', sub: '四叶草正在向你飞来...' },
            { icon: '🌈', text: '美好的一天', sub: '暴风雨后总会有彩虹。' },
            { icon: '🎯', text: '目标达成', sub: '今天目标都能顺利完成！' }
        ];

        function updateTime() {
            const now = new Date();
            document.getElementById('time').textContent =
                now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
        }

        function setDate() {
            const now = new Date();
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            document.getElementById('date').textContent =
                `${now.getMonth() + 1}月${now.getDate()}日 ${weekdays[now.getDay()]}`;
        }

        function initContent() {
            const greeting = greetings[timeParam] || greetings.morning;
            document.getElementById('greeting').innerHTML = `<span style="font-size:32px;margin-right:8px">${greeting.emoji}</span>${greeting.text}`;

            if (name) {
                document.getElementById('recipient').textContent = name;
            }
            if (customMsg) {
                document.getElementById('message').textContent = customMsg;
            }

            const quotes = timeParam === 'noon' ? noonQuotes :
                          timeParam === 'evening' ? eveningQuotes : morningQuotes;
            document.getElementById('quote').textContent = quotes[Math.floor(Math.random() * quotes.length)];
            if (sender) {
                document.getElementById('shareInfo').textContent = `— 来自 ${sender} 的祝福`;
            }
        }

        function createConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4'];
            for (let i = 0; i < 60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + '%';
                c.style.background = colors[Math.floor(Math.random() * colors.length)];
                c.style.animationDelay = Math.random() * 0.5 + 's';
                container.appendChild(c);
                setTimeout(() => c.remove(), 3500);
            }
        }

        function showSurprise() {
            const s = surprises[Math.floor(Math.random() * surprises.length)];
            document.getElementById('surpriseIcon').textContent = s.icon;
            document.getElementById('surpriseText').textContent = s.text;
            document.getElementById('surpriseSub').textContent = s.sub;
            document.getElementById('surpriseModal').style.display = 'flex';
            createConfetti();
        }

        function closeSurprise() {
            document.getElementById('surpriseModal').style.display = 'none';
        }

        function createControls() {
            const container = document.getElementById('controls');
            document.querySelectorAll('.slide').forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'control-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToSlide(i);
                container.appendChild(dot);
            });
        }

        let currentSlide = 0;
        function goToSlide(index) {
            document.querySelectorAll('.slide')[currentSlide].classList.remove('active');
            document.querySelectorAll('.control-dot')[currentSlide].classList.remove('active');
            currentSlide = index;
            document.querySelectorAll('.slide')[currentSlide].classList.add('active');
            document.querySelectorAll('.control-dot')[currentSlide].classList.add('active');
        }

        initContent();
        updateTime();
        setDate();
        createControls();

        setInterval(updateTime, 1000);
        setInterval(() => goToSlide((currentSlide + 1) % 5), 8000);
    </script>
</body>
</html>
