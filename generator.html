<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝福生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ========== 动态风景背景 ========== */
        .bg-slideshow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        .bg-slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }

        .bg-slide.active { opacity: 1; }

        .bg-slide::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45);
        }

        .bg-vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            box-shadow: inset 0 0 200px rgba(0,0,0,0.6);
        }

        /* ========== 生成器卡片 ========== */
        .generator {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 45px 40px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            color: #ffd700;
            font-size: 22px;
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 6px;
            text-shadow: 0 2px 15px rgba(255,215,0,0.2);
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            color: rgba(255,255,255,0.55);
            font-size: 11px;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input, textarea {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 12px 15px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: rgba(255,215,0,0.6);
            background: rgba(255,215,0,0.08);
            box-shadow: 0 0 15px rgba(255,215,0,0.1);
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255,255,255,0.25);
        }

        textarea {
            resize: none;
            height: 70px;
        }

        .time-select {
            display: flex;
            gap: 8px;
        }

        .time-option {
            flex: 1;
            padding: 12px 8px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }

        .time-option:hover {
            background: rgba(255,255,255,0.1);
        }

        .time-option.active {
            background: rgba(255,215,0,0.12);
            border-color: rgba(255,215,0,0.5);
            color: #ffd700;
            box-shadow: 0 0 12px rgba(255,215,0,0.1);
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            padding: 14px;
            font-size: 14px;
            color: #1a1a2e;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255,215,0,0.35);
        }

        .result {
            display: none;
            margin-top: 22px;
            padding: 16px;
            background: rgba(0,0,0,0.25);
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .result-label {
            color: rgba(255,255,255,0.45);
            font-size: 11px;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .link-box {
            display: flex;
            gap: 8px;
        }

        .link-input {
            flex: 1;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 12px;
            border-radius: 8px;
            color: #fff;
            font-size: 12px;
        }

        .copy-btn {
            background: #ffd700;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            color: #1a1a2e;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .copy-btn:hover { background: #fff; }

        .copy-btn.copied {
            background: #4ecdc4;
            color: #fff;
        }

        .preview-btn {
            width: 100%;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            padding: 11px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .preview-btn:hover {
            border-color: rgba(255,215,0,0.5);
            color: #ffd700;
        }

        .tips {
            text-align: center;
            margin-top: 22px;
            color: rgba(255,255,255,0.35);
            font-size: 12px;
            letter-spacing: 1px;
        }

        @media (max-width: 480px) {
            .generator { padding: 30px 25px; }
            h1 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <!-- 风景背景 -->
    <div class="bg-slideshow" id="bgSlideshow">
        <div class="bg-slide active" style="background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920')"></div>
        <div class="bg-slide" style="background-image: url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1920')"></div>
        <div class="bg-slide" style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1920')"></div>
        <div class="bg-slide" style="background-image: url('https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1920')"></div>
    </div>
    <div class="bg-vignette"></div>

    <!-- 生成器卡片 -->
    <div class="generator">
        <h1>祝福生成器</h1>

        <div class="field">
            <label>送给谁</label>
            <input type="text" id="to" placeholder="输入名字，如：小明">
        </div>

        <div class="field">
            <label>祝福语</label>
            <textarea id="msg" placeholder="输入你想说的话，如：愿你今天事事顺利"></textarea>
        </div>

        <div class="field">
            <label>时段</label>
            <div class="time-select">
                <div class="time-option active" data-time="morning" onclick="selectTime(this)">🌅 早上好</div>
                <div class="time-option" data-time="noon" onclick="selectTime(this)">☀️ 中午好</div>
                <div class="time-option" data-time="evening" onclick="selectTime(this)">🌙 晚上好</div>
            </div>
        </div>

        <div class="field">
            <label>你的署名</label>
            <input type="text" id="from" placeholder="输入你的名字，如：小红">
        </div>

        <button class="btn" onclick="generate()">生成祝福链接</button>

        <div class="result" id="result">
            <div class="result-label">你的祝福链接</div>
            <div class="link-box">
                <input type="text" class="link-input" id="linkInput" readonly>
                <button class="copy-btn" id="copyBtn" onclick="copyLink()">复制</button>
            </div>
            <button class="preview-btn" onclick="preview()">👁️ 预览效果</button>
        </div>

        <div class="tips">发送给朋友，让他们感受你的心意 ✨</div>
    </div>

    <script>
        // 背景幻灯片自动切换
        let bgSlide = 0;
        const bgSlides = document.querySelectorAll('.bg-slide');
        setInterval(() => {
            bgSlides[bgSlide].classList.remove('active');
            bgSlide = (bgSlide + 1) % bgSlides.length;
            bgSlides[bgSlide].classList.add('active');
        }, 6000);

        // 时段选择
        let selectedTime = 'morning';

        function selectTime(el) {
            document.querySelectorAll('.time-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
            selectedTime = el.dataset.time;
        }

        // 根据当前时间自动选中时段
        (function autoSelectTime() {
            const h = new Date().getHours();
            let timeKey = 'morning';
            if (h >= 18 || h < 6) timeKey = 'evening';
            else if (h >= 11 && h < 18) timeKey = 'noon';
            const target = document.querySelector(`.time-option[data-time="${timeKey}"]`);
            if (target) selectTime(target);
        })();

        function buildQuery() {
            const to = document.getElementById('to').value.trim();
            const msg = document.getElementById('msg').value.trim();
            const from = document.getElementById('from').value.trim();
            let query = '?t=' + selectedTime;
            if (to) query += '&n=' + encodeURIComponent(to);
            if (msg) query += '&m=' + encodeURIComponent(msg);
            if (from) query += '&f=' + encodeURIComponent(from);
            return query;
        }

        function generate() {
            document.getElementById('linkInput').value =
                'https://cetusdraco.github.io/morning-wish/morning.html' + buildQuery();
            document.getElementById('result').style.display = 'block';
        }

        function copyLink() {
            const input = document.getElementById('linkInput');
            input.select();
            document.execCommand('copy');
            const btn = document.getElementById('copyBtn');
            btn.textContent = '已复制';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = '复制';
                btn.classList.remove('copied');
            }, 2000);
        }

        function preview() {
            window.open('morning.html' + buildQuery(), '_blank');
        }
    </script>
</body>
</html>
